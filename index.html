<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài Quyền Lão Hổ Thượng Sơn</title>
    <style>
        /* Phong cách mộc mạc, tập trung vào nội dung */
        body {
            font-family: 'Times New Roman', serif;
            background-color: #fdfbf7;
            color: #000;
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            font-size: 2em;
            margin-bottom: 30px;
            text-transform: uppercase;
        }

        /* Bảng danh sách mộc mạc, giống tài liệu văn bản */
        table {
            width: 100%;
            border-collapse: collapse;
            background-color: #fff;
            font-size: 1.1em;
        }

        th, td {
            border: 1px solid #000;
            padding: 10px 15px;
            text-align: left;
            vertical-align: top;
        }

        th {
            font-weight: bold;
        }

        td:nth-child(1), th:nth-child(1),
        td:nth-child(3), th:nth-child(3) {
            text-align: center;
        }

        .section-row td {
            font-weight: bold;
        }

        /* Tùy chỉnh hiển thị cho đường link trong bảng */
        td a {
            color: #d32f2f; /* Màu đỏ sẫm cho link */
            text-decoration: none; /* Bỏ gạch chân mặc định */
        }

        td a:hover {
            text-decoration: underline; /* Hiện gạch chân khi di chuột vào */
        }

    </style>
</head>
<body>

    <div class="container">
        <h1>Lão Hổ Thượng Sơn</h1>
        
        <table>
            <thead>
                <tr>
                    <th style="width: 10%;">TT</th>
                    <th style="width: 50%;">Nội dung</th>
                    <th style="width: 15%;">Động tác</th>
                    <th style="width: 25%;">Ghi chú</th>
                </tr>
            </thead>
            <tbody>
                <tr class="section-row">
                    <td colspan="2">
                        Phân đoạn 1: 10 câu thiệu<br>
                        Từ động tác 1 đến 15
                    </td>
                    <td style="vertical-align: middle;">15 động tác</td>
                    <td></td>
                </tr>
                
                <tr>
                    <td>1</td>
                    <td><a href="https://lelevietnam99.github.io/A1-LAOHOTHUONGSON-1-BAI-TO-LAO-HO-THUONG-SON/" target="_blank">Bái tổ lão hổ thượng sơn <strong>(6)</strong></a></td>
                    <td>6</td>
                    <td></td>
                </tr>
                <tr>
                    <td>2</td>
                    <td><a href="http://abc.com" target="_blank">Chấp thủ khai mã <strong>(1)</strong></a></td>
                    <td>7</td>
                    <td></td>
                </tr>
                <tr>
                    <td>3</td>
                    <td><a href="http://abc.com" target="_blank">Song thủ phá cước <strong>(1)</strong></a></td>
                    <td>8</td>
                    <td></td>
                </tr>
                <tr>
                    <td>4</td>
                    <td><a href="http://abc.com" target="_blank">Đồng tử dâng quả <strong>(1)</strong></a></td>
                    <td>9</td>
                    <td></td>
                </tr>
                <tr>
                    <td>5</td>
                    <td><a href="http://abc.com" target="_blank">Lưỡng thủ khai môn <strong>(1)</strong></a></td>
                    <td>10</td>
                    <td></td>
                </tr>
                <tr>
                    <td>6</td>
                    <td><a href="http://abc.com" target="_blank">Đơn tọa phục hổ <strong>(1)</strong></a></td>
                    <td>11</td>
                    <td></td>
                </tr>
                <tr>
                    <td>7</td>
                    <td><a href="http://abc.com" target="_blank">Hữu thủ yểm tâm <strong>(1)</strong></a></td>
                    <td>12</td>
                    <td></td>
                </tr>
            </tbody>
        </table>
    </div>

</body>
</html>
